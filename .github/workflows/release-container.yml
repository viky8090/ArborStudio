name: Build & Push Container

on:
  push:
    branches: [main]
    paths:
      - 'apps/container/**'
    tags: ['v*.*.*']

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & push to Cloudflare Container Registry
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to Cloudflare Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cloudflare.com
          username: ${{ secrets.CLOUDFLARE_REGISTRY_USERNAME }}
          password: ${{ secrets.CLOUDFLARE_REGISTRY_PASSWORD }}
      - name: Extract version
        id: meta
        run: |
          VERSION="${{ github.ref_name }}"
          echo "VERSION=${VERSION##v}" >> $GITHUB_OUTPUT
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: apps/container
          push: true
          tags: |
            registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/arbor-runner:${{ steps.meta.outputs.VERSION }}
            registry.cloudflare.com/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/arbor-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
